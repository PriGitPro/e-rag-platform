version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-r2-local:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: erp-minio-r2-local
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: r2local
      MINIO_ROOT_PASSWORD: r2localpass
    ports:
      - "9010:9000"
      - "9011:9001"
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: erp-api-gateway
    restart: unless-stopped
    env_file: ../.env.local
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion-worker:
    build:
      context: ..
      dockerfile: apps/ingestion-worker/Dockerfile
    container_name: erp-ingestion-worker
    restart: unless-stopped
    env_file: ../.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  query-service:
    build:
      context: ..
      dockerfile: apps/ingestion-worker/Dockerfile
    container_name: erp-query-service
    restart: unless-stopped
    command: ["python", "-u", "query_server.py"]
    env_file: ../.env.local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: erp-web
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://api-gateway:3000
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

  # ── Local LLM (opt-in) ────────────────────────────────────────────────────
  # Start with:  docker compose --profile ollama up
  # Pull model:  docker exec erp-ollama ollama pull llama3.2
  # Then set in .env.local:  LLM_PROVIDER=ollama  LLM_MODEL=llama3.2
  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    container_name: erp-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
  # ──────────────────────────────────────────────────────────────────────────

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: erp-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: erp-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /minio_data --console-address ":9001"

  milvus-standalone:
    image: milvusdb/milvus:v2.4.4
    container_name: erp-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

volumes:
  postgres_data:
  ollama_data:
